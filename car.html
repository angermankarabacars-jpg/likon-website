<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Автомобиль — Likon Auto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── PAGE LAYOUT ── */
    .car-page {
      background: rgba(3,3,3,0.97);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 55% 45%;
      align-items: start;
      min-height: calc(100vh - 70px);
      padding-top: 70px;
    }

    /* ── GALLERY (LEFT) ── */
    .car-gallery {
      padding: 36px 24px 48px 52px;
      position: sticky;
      top: 70px;
    }

    .gallery-main {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #000;
      cursor: zoom-in;
    }
    .gallery-main img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity 0.25s ease;
    }
    .gallery-main img.fade { opacity: 0; }

    .gallery-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
      z-index: 2;
    }
    .gallery-arrow:hover { background: var(--gold); border-color: var(--gold); }
    .gallery-prev { left: 14px; }
    .gallery-next { right: 14px; }

    .gallery-counter {
      position: absolute; bottom: 12px; right: 14px;
      font-size: 10px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.5);
      padding: 3px 9px;
      z-index: 2;
    }

    .gallery-thumbs {
      display: flex; gap: 8px;
      margin-top: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .gallery-thumbs::-webkit-scrollbar { display: none; }

    .gallery-thumb {
      width: 90px; height: 62px; flex-shrink: 0;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.45;
      border: 1px solid transparent;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .gallery-thumb:hover { opacity: 0.75; }
    .gallery-thumb.active { opacity: 1; border-color: var(--gold); }

    /* ── INFO (RIGHT) ── */
    .car-info {
      padding: 36px 52px 64px 40px;
      border-left: 1px solid var(--border);
    }

    .car-info-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--w40); margin-bottom: 36px;
      transition: color 0.2s;
    }
    .car-info-back:hover { color: var(--white); }

    .car-info-brand {
      font-size: 10px; font-weight: 700; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
    }
    .car-info-title {
      font-family: var(--display); font-size: clamp(32px, 3.5vw, 52px);
      font-weight: 300; line-height: 1.05; margin-bottom: 40px;
    }

    .spec-block-title {
      font-size: 9px; font-weight: 700; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
    }
    .spec-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 13px 0; border-bottom: 1px solid var(--border);
    }
    .spec-row:first-of-type { border-top: 1px solid var(--border); }
    .spec-key { font-size: 12px; color: var(--w40); letter-spacing: 0.05em; }
    .spec-val { font-size: 13px; color: var(--white); font-weight: 500; text-align: right; }

    .price-block {
      margin: 32px 0;
      padding: 28px 28px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    .price-label { font-size: 9px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--w40); margin-bottom: 8px; }
    .price-value { font-family: var(--display); font-size: 40px; font-weight: 300; line-height: 1; }
    .price-value.req { font-family: var(--body); font-size: 14px; font-weight: 400; color: var(--w70); letter-spacing: 0.03em; margin-top: 4px; }
    .price-note { font-size: 11px; color: var(--w40); margin-top: 8px; line-height: 1.7; }

    .car-desc-sep { width: 36px; height: 1px; background: var(--gold); margin: 32px 0 20px; }
    .car-desc-text { font-size: 14px; color: var(--w70); line-height: 1.95; font-weight: 300; margin-bottom: 36px; }

    .car-cta-title { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--w40); margin-bottom: 14px; }
    .car-cta-btns { display: flex; flex-direction: column; gap: 10px; }
    .btn-wa {
      display: inline-flex; align-items: center; gap: 10px;
      background: #25D366; color: #fff;
      padding: 15px 28px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      border: none; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-wa:hover { background: #1fba5a; transform: translateY(-2px); color: #fff; }

    /* ── FULLSCREEN OVERLAY ── */
    .gallery-fs {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.96);
      align-items: center; justify-content: center;
    }
    .gallery-fs.open { display: flex; }
    .gallery-fs img {
      max-width: 92vw; max-height: 92vh;
      object-fit: contain;
    }
    .fs-close {
      position: fixed; top: 20px; right: 24px;
      background: none; border: none; color: rgba(255,255,255,0.6);
      font-size: 28px; cursor: pointer; line-height: 1;
      transition: color 0.2s;
    }
    .fs-close:hover { color: #fff; }
    .fs-arrow {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 50px; height: 50px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .fs-arrow:hover { background: var(--gold); border-color: var(--gold); }
    .fs-prev { left: 16px; }
    .fs-next { right: 16px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .car-page { grid-template-columns: 1fr; padding-top: 70px; }
      .car-gallery { padding: 0; position: static; }
      .gallery-main { aspect-ratio: 4/3; }
      .gallery-thumbs { padding: 0 16px; margin-top: 8px; }
      .car-info { padding: 32px 22px 56px; border-left: none; border-top: 1px solid var(--border); }
      .car-info-back { margin-bottom: 24px; }
    }
    @media (min-width: 901px) and (max-width: 1100px) {
      .car-gallery { padding: 36px 16px 36px 28px; }
      .car-info { padding: 36px 28px 48px 20px; }
    }

    /* ── LIGHT THEME ── */
    body.light .car-page { background: #fff; }
    body.light .car-info { border-color: rgba(0,0,0,0.08); }
    body.light .price-block { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.09); }
    body.light .spec-row { border-color: rgba(0,0,0,0.08); }


    .car-notfound {
      min-height: 60vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 48px 24px;
      background: rgba(3,3,3,0.97);
    }
    .car-notfound h1 { font-family: var(--display); font-size: 48px; font-weight: 300; margin-bottom: 16px; }
    .car-notfound p { color: var(--w40); margin-bottom: 32px; }

    /* ── SIMILAR CARS ── */
    .similar-section {
      background: rgba(3,3,3,0.97);
      border-top: 1px solid var(--border);
      padding: 72px 52px 80px;
    }
    .similar-inner { max-width: 1400px; margin: 0 auto; }
    .similar-header { margin-bottom: 40px; }
    .similar-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
    }
    .similar-title {
      font-family: var(--display); font-size: clamp(26px, 2.8vw, 40px);
      font-weight: 300; margin-bottom: 20px;
    }
    .similar-rule { width: 36px; height: 1px; background: var(--gold); }
    .similar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .similar-section .car-card {
      display: block; color: var(--white);
      background: rgba(10,10,10,0.95);
      border: 1px solid var(--border); overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      text-decoration: none;
    }
    .similar-section .car-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.7);
      border-color: rgba(208,95,0,0.3);
    }
    .similar-section .car-img { aspect-ratio: 16/10; overflow: hidden; }
    .similar-section .car-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
    .similar-section .car-card:hover .car-img img { transform: scale(1.06); }
    .similar-section .car-body { padding: 18px 20px 22px; }
    .similar-section .car-brand-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 5px;
    }
    .similar-section .car-model-lbl {
      font-family: var(--display); font-size: 20px; font-weight: 400; margin-bottom: 10px;
    }
    .similar-section .car-specs-row {
      display: flex; align-items: center; gap: 5px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .similar-section .cs { font-size: 11px; color: var(--w70); }
    .similar-section .cd { width: 2px; height: 2px; background: var(--w15); border-radius: 50%; flex-shrink: 0; }
    .similar-section .car-price-lbl { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
    .similar-section .car-price-lbl.req {
      font-size: 11px; font-weight: 400; color: var(--w40); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .similar-section .car-link-lbl {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gold); border-bottom: 1px solid rgba(208,95,0,0.25); padding-bottom: 2px;
      transition: gap 0.2s, border-color 0.2s;
    }
    .similar-section .car-card:hover .car-link-lbl { gap: 11px; border-color: var(--gold); }

    @media (max-width: 1100px) {
      .similar-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 900px) {
      .similar-section { padding: 48px 0 64px; }
      .similar-header { padding: 0 22px; }
      .similar-grid {
        display: flex; flex-direction: row;
        overflow-x: auto; scroll-snap-type: x mandatory;
        gap: 10px; padding: 0 22px 16px;
        scrollbar-width: none;
        grid-template-columns: unset;
      }
      .similar-grid::-webkit-scrollbar { display: none; }
      .similar-grid .car-card {
        flex: 0 0 calc(50% - 5px);
        scroll-snap-align: start;
      }
      .similar-section .car-body { padding: 10px 12px 14px; }
      .similar-section .car-model-lbl { font-size: 15px; margin-bottom: 7px; }
      .similar-section .car-price-lbl { font-size: 14px; margin-bottom: 10px; }
    }

    body.light .similar-section { background: #fff; border-top-color: rgba(0,0,0,0.08); }
    body.light .similar-section .car-card { background: #fff; border-color: rgba(0,0,0,0.09); }
    body.light .similar-section .car-card:hover { box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
  </style>
</head>

<script>
/* ── NAV / THEME ── */
function toggleNav() { document.getElementById('navMobile').classList.toggle('open'); }
document.getElementById('nav').classList.add('solid');
window.addEventListener('scroll', () => { document.getElementById('nav').classList.add('solid'); });
(function(){
  const saved = localStorage.getItem('likonTheme');
  if (saved === 'light') document.body.classList.add('light');
  function syncIcon() {
    const isLight = document.body.classList.contains('light');
    document.querySelectorAll('.theme-toggle').forEach(btn => {
      btn.innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    });
  }
  syncIcon();
  window.toggleTheme = function() {
    document.body.classList.toggle('light');
    localStorage.setItem('likonTheme', document.body.classList.contains('light') ? 'light' : 'dark');
    syncIcon();
  };
})();

/* ── GALLERY STATE ── */
let photos = [];
let currentIdx = 0;

function showPhoto(idx) {
  if (!photos.length) return;
  currentIdx = (idx + photos.length) % photos.length;
  const mainImg = document.getElementById('mainImg');
  mainImg.classList.add('fade');
  setTimeout(() => {
    mainImg.src = photos[currentIdx];
    mainImg.classList.remove('fade');
  }, 150);
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === currentIdx);
    if (i === currentIdx) t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  });
  document.getElementById('galleryCounter').textContent = `${currentIdx + 1} / ${photos.length}`;
}

/* ── FULLSCREEN ── */
function openFs() {
  document.getElementById('fsImg').src = photos[currentIdx];
  document.getElementById('galleryFs').classList.add('open');
}
function closeFs() { document.getElementById('galleryFs').classList.remove('open'); }
function fsNav(dir) {
  currentIdx = (currentIdx + dir + photos.length) % photos.length;
  document.getElementById('fsImg').src = photos[currentIdx];
  showPhoto(currentIdx);
}
document.getElementById('galleryFs').addEventListener('click', function(e) {
  if (e.target === this) closeFs();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('galleryFs').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') fsNav(-1);
  if (e.key === 'ArrowRight') fsNav(1);
  if (e.key === 'Escape') closeFs();
});

/* ── LOAD CAR ── */
let carData = null;
let allCarsData = [];

/* ── SIMILAR CARS ── */
function getSimilarCars(current, all) {
  const others = all.filter(c => c.id !== current.id);

  // 1. Same brand
  let picked = others.filter(c => c.brand === current.brand);

  // 2. Fallback: price range ±40%
  if (picked.length < 4 && current.price) {
    const min = current.price * 0.6, max = current.price * 1.4;
    const ids = new Set(picked.map(c => c.id));
    others.filter(c => !ids.has(c.id) && c.price && c.price >= min && c.price <= max)
      .forEach(c => picked.push(c));
  }

  // 3. Fallback: any other car
  if (picked.length < 4) {
    const ids = new Set(picked.map(c => c.id));
    others.filter(c => !ids.has(c.id)).forEach(c => picked.push(c));
  }

  return picked.slice(0, 4);
}

function renderSimilarSection() {
  if (!carData || !allCarsData.length) return;
  const isEn = (localStorage.getItem('likonLang') || 'ru') === 'en';
  const similar = getSimilarCars(carData, allCarsData);
  if (!similar.length) return;

  const cardsHTML = similar.map(car => {
    const isReq = !car.price;
    const price = isReq
      ? (isEn ? 'On request' : 'По запросу')
      : '$' + car.price.toLocaleString('en-US');
    const linkLabel = isReq
      ? (isEn ? 'Get price' : 'Узнать цену')
      : (isEn ? 'Details' : 'Подробнее');
    const colorLabel = isEn ? (car.color_en || car.color) : car.color;
    const kmLabel = car.mileage.toLocaleString('ru-RU') + (isEn ? ' km' : ' км');
    return `<a href="/car.html?id=${car.id}" class="car-card">
      <div class="car-img"><img src="${car.image}" alt="${car.brand} ${car.model}" loading="lazy"></div>
      <div class="car-body">
        <div class="car-brand-lbl">${car.brand}</div>
        <div class="car-model-lbl">${car.model}</div>
        <div class="car-specs-row">
          <span class="cs">${car.year}</span>
          <div class="cd"></div>
          <span class="cs">${colorLabel}</span>
          <div class="cd"></div>
          <span class="cs">${kmLabel}</span>
        </div>
        <div class="car-price-lbl ${isReq ? 'req' : ''}">${price}</div>
        <span class="car-link-lbl">${linkLabel} →</span>
      </div>
    </a>`;
  }).join('');

  const existing = document.getElementById('similarSection');
  if (existing) existing.remove();

  const section = document.createElement('section');
  section.id = 'similarSection';
  section.className = 'similar-section';
  section.innerHTML = `
    <div class="similar-inner">
      <div class="similar-header">
        <div class="similar-label">${isEn ? 'Similar cars' : 'Похожие автомобили'}</div>
        <div class="similar-title">${isEn ? 'You might also like' : 'Вам также может понравиться'}</div>
        <div class="similar-rule"></div>
      </div>
      <div class="similar-grid">${cardsHTML}</div>
    </div>`;

  document.querySelector('footer').insertAdjacentElement('beforebegin', section);
}

function renderCarPage() {
  if (!carData) return;
  const car = carData;
  const isEn = (localStorage.getItem('likonLang') || 'ru') === 'en';

  const isReq = !car.price;
  const price = isReq ? null : '$' + car.price.toLocaleString('en-US');
  const wa = encodeURIComponent(`Здравствуйте, интересует ${car.brand} ${car.model} ${car.year} г. Подскажите подробнее.`);

  const color    = isEn ? (car.color_en    || car.color)         : car.color;
  const interior = isEn ? (car.interiorColor_en || car.interiorColor) : car.interiorColor;
  const fuel     = isEn ? (car.fuel_en     || car.fuel)          : car.fuel;
  const drive    = car.drive || (car.specs?.['Привод'] || '');
  const engine   = car.specs?.['Двигатель'] || '';
  const desc     = isEn ? (car.description_en || car.description) : car.description;

  const specsRows = [
    [isEn ? 'Year'           : 'Год выпуска',  car.year],
    [isEn ? 'Exterior color' : 'Цвет кузова',  color],
    interior ? [isEn ? 'Interior color' : 'Цвет салона', interior] : null,
    [isEn ? 'Mileage'        : 'Пробег',       car.mileage.toLocaleString('ru-RU') + ' км'],
    fuel   ? [isEn ? 'Fuel'  : 'Топливо',      fuel]   : null,
    drive  ? [isEn ? 'Drive' : 'Привод',        drive]  : null,
    engine ? [isEn ? 'Engine': 'Двигатель',     engine] : null,
  ].filter(Boolean).map(([k, v]) => `
    <div class="spec-row">
      <span class="spec-key">${k}</span>
      <span class="spec-val">${v}</span>
    </div>`).join('');

  const thumbsHTML = photos.map((src, i) => `
    <img class="gallery-thumb${i === 0 ? ' active' : ''}" src="${src}" alt="Photo ${i+1}" onclick="showPhoto(${i})">`
  ).join('');

  document.getElementById('carPage').innerHTML = `
    <div class="car-page">
      <div class="car-gallery">
        <div class="gallery-main" id="galleryMain">
          <img id="mainImg" src="${photos[0] || ''}" alt="${car.brand} ${car.model}">
          <button class="gallery-arrow gallery-prev" onclick="showPhoto(currentIdx - 1)"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="gallery-arrow gallery-next" onclick="showPhoto(currentIdx + 1)"><i class="fa-solid fa-chevron-right"></i></button>
          <div class="gallery-counter" id="galleryCounter">1 / ${photos.length}</div>
        </div>
        <div class="gallery-thumbs">${thumbsHTML}</div>
      </div>

      <div class="car-info">
        <a href="/catalog.html" class="car-info-back" data-i18n="car.back">← Назад к каталогу</a>
        <div class="car-info-brand">${car.brand}</div>
        <h1 class="car-info-title">${car.model} <span style="color:var(--gold)">${car.year}</span></h1>

        <div class="spec-block-title" data-i18n="car.specs">${isEn ? 'Specifications' : 'Характеристики'}</div>
        ${specsRows}

        <div class="price-block">
          <div class="price-label" data-i18n="car.price">${isEn ? 'Price' : 'Цена'}</div>
          ${isReq
            ? `<div class="price-value req" data-i18n="car.price.req">${isEn ? 'Price on request — contact us for the best offer' : 'Цена по запросу — напишите нам, подберём лучшее предложение'}</div>`
            : `<div class="price-value">${price}</div>`}
          ${!isReq ? `<div class="price-note" data-i18n="car.price.note">${isEn ? 'Price excludes shipping and customs clearance.' : 'Цена указана без учёта доставки и таможенного оформления.'}</div>` : ''}
        </div>

        <div class="car-desc-sep"></div>
        <p class="car-desc-text">${desc || ''}</p>

        <div class="car-cta-title" data-i18n="car.cta.title">${isEn ? 'Interested in this car?' : 'Заинтересовал автомобиль?'}</div>
        <div class="car-cta-btns">
          <a href="https://wa.me/821090905971?text=${wa}" class="btn-wa" target="_blank">
            <i class="fa-brands fa-whatsapp"></i> <span data-i18n="car.wa">${isEn ? 'Message on WhatsApp' : 'Написать в WhatsApp'}</span>
          </a>
          <a href="/catalog.html" class="btn-outline" data-i18n="car.back2">${isEn ? '← Back to catalog' : '← Назад к каталогу'}</a>
        </div>
      </div>
    </div>`;

  showPhoto(currentIdx);
  document.getElementById('galleryMain').addEventListener('dblclick', openFs);
  let tx = 0;
  const mainEl = document.getElementById('mainImg');
  mainEl.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  mainEl.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 50) showPhoto(currentIdx + (dx < 0 ? 1 : -1));
  });

  renderSimilarSection();
}

async function loadCar() {
  const id = new URLSearchParams(window.location.search).get('id');
  const container = document.getElementById('carPage');

  let cars = [];
  try { cars = await (await fetch('/cars.json')).json(); } catch(e) {}
  allCarsData = cars;

  const car = cars.find(c => c.id === id);
  if (!car) {
    container.innerHTML = `
      <div class="car-notfound">
        <h1>Автомобиль не найден</h1>
        <p>Возможно, этот автомобиль уже продан или ссылка устарела.</p>
        <a href="/" class="btn-gold">← Вернуться в каталог</a>
      </div>`;
    return;
  }

  document.title = `${car.brand} ${car.model} ${car.year} — Likon Auto`;
  carData = car;
  photos = (car.images && car.images.length) ? car.images : (car.image ? [car.image] : []);
  currentIdx = 0;
  renderCarPage();
}

loadCar();
</script>
<script src="/lang.js"></script>
<script>
  const _origToggle = window.toggleLang;
  window.toggleLang = function() {
    const lang = localStorage.getItem('likonLang') || 'ru';
    localStorage.setItem('likonLang', lang === 'ru' ? 'en' : 'ru');
    applyLang();
    renderCarPage();
  };
</script>
</body>
</html>
