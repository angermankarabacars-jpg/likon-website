<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Автомобиль — Likon Auto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── CAR HERO ── */
    .car-hero {
      height: 75vh; min-height: 520px;
      position: relative;
      overflow: hidden;
      display: flex; align-items: flex-end;
    }
    .car-hero-img {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform 8s ease;
    }
    .car-hero:hover .car-hero-img { transform: scale(1.04); }
    .car-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 100%);
    }
    .car-hero-content {
      position: relative; z-index: 1;
      width: 100%; max-width: 1320px; margin: 0 auto;
      padding: 0 52px 52px;
    }
    .car-hero-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--w40); margin-bottom: 28px;
      transition: color 0.2s;
    }
    .car-hero-back:hover { color: var(--white); }
    .car-hero-brand {
      font-size: 10px; font-weight: 700; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
    }
    .car-hero-title {
      font-family: var(--display); font-size: clamp(42px, 6vw, 80px);
      font-weight: 300; line-height: 1.0;
      text-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }

    /* ── MAIN CONTENT ── */
    .car-main {
      background: rgba(3,3,3,0.97);
      border-top: 1px solid var(--border);
    }
    .car-inner {
      max-width: 1320px; margin: 0 auto;
      padding: 72px 52px;
      display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px;
    }

    /* LEFT: specs */
    .car-specs-col {}
    .spec-block { margin-bottom: 40px; }
    .spec-block-title {
      font-size: 9px; font-weight: 700; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 18px;
    }
    .spec-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .spec-row:first-of-type { border-top: 1px solid var(--border); }
    .spec-key { font-size: 12px; color: var(--w40); letter-spacing: 0.05em; }
    .spec-val { font-size: 14px; color: var(--white); font-weight: 500; text-align: right; }

    .price-block { margin-top: 44px; padding: 32px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); }
    .price-label { font-size: 9px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--w40); margin-bottom: 10px; }
    .price-value { font-family: var(--display); font-size: 44px; font-weight: 300; line-height: 1; }
    .price-value.req { font-family: var(--body); font-size: 14px; font-weight: 400; color: var(--w70); letter-spacing: 0.05em; margin-top: 6px; }
    .price-note { font-size: 12px; color: var(--w40); margin-top: 10px; line-height: 1.7; }

    /* RIGHT: description + CTA */
    .car-desc-col {}
    .car-desc-label { font-size: 9px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .car-desc-title {
      font-family: var(--display); font-size: clamp(28px, 3vw, 42px);
      font-weight: 300; line-height: 1.15; margin-bottom: 20px;
    }
    .car-desc-rule { width: 36px; height: 1px; background: var(--gold); margin-bottom: 28px; }
    .car-desc-text { font-size: 15px; color: var(--w70); line-height: 1.95; font-weight: 300; margin-bottom: 44px; }

    .car-cta-title { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--w40); margin-bottom: 16px; }
    .car-cta-btns { display: flex; flex-direction: column; gap: 12px; }
    .btn-wa {
      display: inline-flex; align-items: center; gap: 10px;
      background: #25D366; color: #fff;
      padding: 15px 32px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      border: none; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-wa:hover { background: #1fba5a; transform: translateY(-2px); color: #fff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .car-hero-content { padding: 0 22px 40px; }
      .car-inner { grid-template-columns: 1fr; gap: 48px; padding: 48px 22px; }
      .price-block { padding: 24px; }
    }
    @media (min-width: 769px) and (max-width: 1050px) {
      .car-hero-content { padding: 0 28px 44px; }
      .car-inner { padding: 56px 28px; gap: 48px; }
    }

    /* ── LIGHT THEME OVERRIDES ── */
    body.light .car-main { background: #fff; border-color: rgba(0,0,0,0.08); }
    body.light .price-block { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.09); }

    /* not-found state */
    .car-notfound {
      min-height: 60vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 48px 24px;
      background: rgba(3,3,3,0.97);
    }
    .car-notfound h1 { font-family: var(--display); font-size: 48px; font-weight: 300; margin-bottom: 16px; }
    .car-notfound p { color: var(--w40); margin-bottom: 32px; }
  </style>
</head>
<body>

<!-- FIXED BG -->
<div class="page-bg" style="background-image:url('/images/hero-bg.jpg')"></div>
<div class="page-overlay"></div>

<!-- NAV -->
<nav id="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="https://id3v1j-bi.myshopify.com/cdn/shop/files/5_29cf280f-9111-4648-b0de-3da6521fd892.png?v=1776812304&width=600" alt="Likon Auto">
    </a>
    <ul class="nav-links">
      <li class="nav-toggle-desktop"><button class="theme-toggle" onclick="toggleTheme()" title="Переключить тему"><i class="fa-solid fa-moon"></i></button></li>
      <li><a href="/catalog.html">Каталог</a></li>
      <li><a href="/about.html">О нас</a></li>
      <li><a href="/contact.html" class="nav-btn">Связаться</a></li>
    </ul>
    <button class="theme-toggle nav-toggle-mobile" onclick="toggleTheme()" title="Переключить тему"><i class="fa-solid fa-moon"></i></button>
    <button class="nav-ham" onclick="toggleNav()"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="nav-mobile" id="navMobile">
  <a href="/catalog.html">Каталог</a>
  <a href="/about.html">О нас</a>
  <a href="/contact.html">Связаться</a>
</div>

<!-- CONTENT injected by JS -->
<div id="carPage"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-grid">
      <div>
        <div class="footer-logo"><img src="https://id3v1j-bi.myshopify.com/cdn/shop/files/5_29cf280f-9111-4648-b0de-3da6521fd892.png?v=1776812304&width=600" alt="Likon Auto"></div>
        <p class="footer-desc">Экспорт премиальных и люксовых автомобилей из Южной Кореи по всему миру.</p>
        <div class="footer-social-icons">
          <a href="https://wa.me/821090905971" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
          <a href="https://www.instagram.com/likon_auto" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
          <a href="https://www.tiktok.com/@likon_auto" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
          <a href="https://www.linkedin.com/company/likon-auto/" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
          <a href="https://www.facebook.com/share/18TSnmp6Mn/" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
        </div>
      </div>
      <div>
        <p class="footer-col-title">Навигация</p>
        <ul class="footer-nav">
          <li><a href="/catalog.html">Каталог</a></li>
          <li><a href="/about.html">О нас</a></li>
          <li><a href="/contact.html">Связаться</a></li>
        </ul>
      </div>
      <div>
        <p class="footer-col-title">Контакты</p>
        <p class="footer-contact">
          Южная Корея<br>
          <a href="https://wa.me/821090905971" target="_blank">+82 10-9090-5971</a><br>
          <span style="color:rgba(255,255,255,0.2)">Telegram</span>
        </p>
      </div>
    </div>
    <div class="footer-bottom">
      <p class="footer-copy">© 2025 Likon Auto. Все права защищены.</p>
      <div class="footer-socials">
        <a href="https://wa.me/821090905971" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/likon_auto" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@likon_auto" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
        <a href="https://www.linkedin.com/company/likon-auto/" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        <a href="https://www.facebook.com/share/18TSnmp6Mn/" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
      </div>
    </div>
  </div>
</footer>

<script>
function toggleNav() { document.getElementById('navMobile').classList.toggle('open'); }
window.addEventListener('scroll', () => { document.getElementById('nav').classList.toggle('solid', scrollY > 40); });
(function(){
  const saved = localStorage.getItem('likonTheme');
  if(saved === 'light') { document.body.classList.add('light'); }
  function syncIcon() {
    const isLight = document.body.classList.contains('light');
    document.querySelectorAll('.theme-toggle').forEach(btn => {
      btn.innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    });
  }
  syncIcon();
  window.toggleTheme = function() {
    document.body.classList.toggle('light');
    localStorage.setItem('likonTheme', document.body.classList.contains('light') ? 'light' : 'dark');
    syncIcon();
  };
})();

async function loadCar() {
  const id = new URLSearchParams(window.location.search).get('id');
  const container = document.getElementById('carPage');

  let cars = [];
  try { cars = await (await fetch('/cars.json')).json(); } catch(e) {}

  const car = cars.find(c => c.id === id);

  if (!car) {
    container.innerHTML = `
      <div class="car-notfound">
        <h1>Автомобиль не найден</h1>
        <p>Возможно, этот автомобиль уже продан или ссылка устарела.</p>
        <a href="/" class="btn-gold">← Вернуться в каталог</a>
      </div>`;
    return;
  }

  document.title = `${car.brand} ${car.model} ${car.year} — Likon Auto`;

  const isReq = !car.price;
  const price = isReq ? null : '$' + car.price.toLocaleString('en-US');
  const wa = encodeURIComponent(`Здравствуйте, интересует ${car.brand} ${car.model} ${car.year} г. (${car.color}, ${car.mileage.toLocaleString('ru-RU')} км). Подскажите подробнее.`);

  const specsRows = [
    ['Год выпуска', car.year],
    ['Цвет', car.color],
    ['Пробег', car.mileage.toLocaleString('ru-RU') + ' км'],
    ...(car.specs ? Object.entries(car.specs) : [])
  ].map(([k, v]) => `
    <div class="spec-row">
      <span class="spec-key">${k}</span>
      <span class="spec-val">${v}</span>
    </div>`).join('');

  container.innerHTML = `
    <div class="car-hero">
      <div class="car-hero-img" style="background-image:url('${car.image}')"></div>
      <div class="car-hero-overlay"></div>
      <div class="car-hero-content">
        <a href="/" class="car-hero-back">← Назад к каталогу</a>
        <div class="car-hero-brand">${car.brand}</div>
        <h1 class="car-hero-title">${car.model} <span style="color:var(--gold)">${car.year}</span></h1>
      </div>
    </div>

    <div class="car-main">
      <div class="car-inner">

        <!-- SPECS -->
        <div class="car-specs-col">
          <div class="spec-block">
            <div class="spec-block-title">Характеристики</div>
            ${specsRows}
          </div>

          <div class="price-block">
            <div class="price-label">Цена</div>
            ${isReq
              ? `<div class="price-value req">Цена по запросу — напишите нам, подберём лучшее предложение</div>`
              : `<div class="price-value">${price}</div>`
            }
            ${!isReq ? `<div class="price-note">Цена указана без учёта доставки и таможенного оформления. Уточняйте у менеджера.</div>` : ''}
          </div>
        </div>

        <!-- DESCRIPTION + CTA -->
        <div class="car-desc-col">
          <div class="car-desc-label">Об автомобиле</div>
          <h2 class="car-desc-title">${car.brand} ${car.model}</h2>
          <div class="car-desc-rule"></div>
          <p class="car-desc-text">${car.description || ''}</p>

          <div class="car-cta-title">Заинтересовал автомобиль?</div>
          <div class="car-cta-btns">
            <a href="https://wa.me/821090905971?text=${wa}" class="btn-wa" target="_blank">
              <i class="fa-brands fa-whatsapp"></i> Написать в WhatsApp
            </a>
            <a href="/" class="btn-outline">← Назад к каталогу</a>
          </div>
        </div>

      </div>
    </div>`;
}

loadCar();
</script>
</body>
</html>
